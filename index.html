<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>DJ_Alexander — scarryscore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-1: #060005;
      --bg-2: #08000c;
      --bg-3: #030006;
      --neon-red: #ff1e56;
      --neon-red-soft: #ff3366;
      --neon-glitch: #ff003c;
      --text-main: #fff0f3;
      --text-muted: #ffb8c6;
      --panel: rgba(12, 2, 18, 0.95);
      --border: rgba(255, 30, 86, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% -20%, #2b0014 0, var(--bg-1) 45%, var(--bg-3) 100%);
      color: var(--text-main);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      overflow: hidden;
    }

    body {
      position: relative;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heavy-pixel-mask {
      position: fixed;
      inset: -20vh;
      pointer-events: none;
      z-index: 0;
      background-image: 
        repeating-linear-gradient(0deg, rgba(0,0,0,0.85) 0px, rgba(0,0,0,0.85) 3px, rgba(255, 30, 86, 0.15) 4px, rgba(0,0,0,0.85) 5px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.8) 0px, rgba(0,0,0,0.8) 3px, rgba(255, 30, 86, 0.1) 4px, rgba(0,0,0,0.8) 5px);
      mix-blend-mode: overlay;
      animation: heavyGlitchMove 8s steps(4) infinite;
    }

    .glitch-blocks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: 
        conic-gradient(from 90deg at 40% 40%, rgba(255,0,60,0.4) 0deg, transparent 90deg, rgba(255,0,60,0.2) 180deg, transparent 270deg),
        conic-gradient(from -90deg at 70% 60%, rgba(0, 255, 255, 0.15) 0deg, transparent 90deg, rgba(255,0,60,0.3) 180deg, transparent 270deg);
      mix-blend-mode: color-dodge;
      opacity: 0.6;
      animation: blockTear 3s infinite alternate;
      image-rendering: pixelated;
    }

    @keyframes heavyGlitchMove {
      0%, 100% { transform: translate3d(0, 0, 0); }
      25% { transform: translate3d(-10px, 15px, 0); }
      50% { transform: translate3d(20px, -5px, 0) scale(1.05); }
      75% { transform: translate3d(-15px, -20px, 0); }
    }

    @keyframes blockTear {
      0%, 90% { clip-path: inset(0 0 0 0); transform: translateX(0); }
      92% { clip-path: inset(20% 0 60% 0); transform: translateX(-25px); opacity: 0.9; filter: hue-rotate(90deg); }
      94% { clip-path: inset(60% 0 10% 0); transform: translateX(35px); opacity: 1; filter: invert(1); }
      96% { clip-path: inset(0 0 0 0); transform: translateX(0); }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      mix-blend-mode: hard-light;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      z-index: 0;
    }

    .vram-artifacts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: difference;
      opacity: 0.8;
    }

    .vram-bar {
      position: absolute;
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--neon-glitch), #fff, var(--neon-glitch), transparent);
      opacity: 0;
      animation: vramSpike 5s infinite;
    }
    .vram-bar:nth-child(1) { top: 22%; animation-delay: 0.2s; }
    .vram-bar:nth-child(2) { top: 58%; animation-delay: 1.7s; height: 8px; }
    .vram-bar:nth-child(3) { top: 85%; animation-delay: 3.1s; }

    @keyframes vramSpike {
      0%, 80%, 100% { opacity: 0; transform: scaleX(0); }
      82% { opacity: 1; transform: scaleX(1.5) translateX(10%); }
      85% { opacity: 0; transform: scaleX(0.5) translateX(-20%); }
    }

    .matrix-rain {
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
      display: flex;
      justify-content: space-around;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--neon-red);
      text-shadow: 0 0 12px var(--neon-glitch), 0 0 25px var(--neon-red);
      opacity: 0.8;
      overflow: hidden;
      transform: rotate(2deg) scale(1.1);
    }
    .matrix-col {
      display: flex;
      flex-direction: column;
      white-space: pre;
      animation: matrixFall linear infinite;
    }
    @keyframes matrixFall {
      from { transform: translateY(-30%); }
      to { transform: translateY(-150%); }
    }

    .cursor-wrapper {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: exclusion;
    }
    .cursor-geo {
      position: absolute;
      width: 40px; height: 40px;
      border: 2px solid #fff;
      transform: translate(-50%, -50%) rotate(45deg);
      transition: width 0.2s, height 0.2s, border-radius 0.2s, transform 0.1s;
      box-shadow: inset 0 0 10px #fff, 0 0 15px #fff;
    }
    .cursor-core {
      position: absolute;
      width: 6px; height: 6px;
      background: #ff003c;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px 5px #ff003c;
      animation: coreTwitch 0.5s infinite;
    }
    @keyframes coreTwitch {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-45%, -55%) scale(1.5); }
    }

    .page-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1000px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .profile-card {
      border-radius: 0; 
      padding: 20px 24px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-left: 6px solid var(--neon-glitch);
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 10px 10px 0 rgba(255, 30, 86, 0.2), 0 0 40px rgba(0,0,0,0.9);
      width: 100%;
      position: relative;
    }

    .profile-card::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(transparent, transparent 2px, rgba(255, 30, 86, 0.1) 3px, transparent 4px);
      pointer-events: none;
    }

    .avatar-wrap {
      width: 110px;
      height: 110px;
      position: relative;
      border: 2px solid var(--neon-red);
      background: #000;
      box-shadow: 0 0 20px rgba(255, 30, 86, 0.5), inset 0 0 15px rgba(255, 30, 86, 0.8);
      animation: avatarPulse 2s infinite alternate;
      overflow: hidden;
      flex-shrink: 0;
    }

    @keyframes avatarPulse {
      0% { box-shadow: 0 0 15px rgba(255, 30, 86, 0.4), inset 0 0 10px rgba(255, 30, 86, 0.6); border-color: var(--neon-red); }
      100% { box-shadow: 0 0 35px rgba(255, 30, 86, 0.9), inset 0 0 25px rgba(255, 30, 86, 1); border-color: #fff; }
    }

    .avatar-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(160%) saturate(140%) grayscale(10%);
      image-rendering: pixelated;
    }

    .avatar-wrap::before, .avatar-wrap::after {
      content: ""; position: absolute; inset: 0;
      background: url("https://cdn-live.warthunder.com/uploads/c2/fc/1d/89c1994b2285c0fb13540b86af1d038c7d/asa.png") center/cover;
      image-rendering: pixelated; mix-blend-mode: screen; pointer-events: none; z-index: 2;
    }
    .avatar-wrap::before {
      left: -3px; filter: drop-shadow(5px 0 0 rgba(255, 0, 60, 0.9));
      animation: rgbGlitch 0.15s infinite linear alternate-reverse;
    }
    .avatar-wrap::after {
      left: 3px; filter: drop-shadow(-5px 0 0 rgba(0, 255, 255, 0.9));
      animation: rgbGlitch 0.25s infinite linear alternate;
    }
    @keyframes rgbGlitch {
      0% { transform: translate(0,0); clip-path: inset(10% 0 80% 0); }
      20% { transform: translate(-2px, 1px); clip-path: inset(40% 0 10% 0); }
      40% { transform: translate(2px, -1px); clip-path: inset(80% 0 5% 0); }
      60% { transform: translate(0, 2px); clip-path: inset(20% 0 50% 0); }
      80% { transform: translate(-1px, -2px); clip-path: inset(50% 0 30% 0); }
      100% { transform: translate(1px, 1px); clip-path: inset(5% 0 90% 0); }
    }

    .avatar-glitch-layer {
      position: absolute; inset: 0;
      background: url("https://cdn-live.warthunder.com/uploads/c2/fc/1d/89c1994b2285c0fb13540b86af1d038c7d/asa.png") center/cover;
      mix-blend-mode: color-burn; filter: hue-rotate(90deg) contrast(200%);
      animation: avatarTear 2s infinite; image-rendering: pixelated; z-index: 3;
    }
    .avatar-scanline {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 10px #fff, 0 0 20px var(--neon-glitch);
      mix-blend-mode: overlay; animation: scanline 2.5s linear infinite; z-index: 4; pointer-events: none;
    }
    @keyframes scanline { 0% { top: -10%; } 100% { top: 110%; } }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 2;
      flex-grow: 1;
    }

    .dj-name {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .nick-line {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 3px 3px 0 var(--neon-glitch), -3px -1px 0 #0ff;
      animation: textJitter 4s infinite;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid #000;
      background: #747f8d; 
      box-shadow: 0 0 10px #747f8d;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.online { background: #43b581; box-shadow: 0 0 12px #43b581; }
    .status-dot.idle { background: #faa61a; box-shadow: 0 0 12px #faa61a; }
    .status-dot.dnd { background: #f04747; box-shadow: 0 0 12px #f04747; }
    .status-dot.offline { background: #747f8d; box-shadow: 0 0 10px #747f8d; }

    .portfolio-card {
      padding: 40px;
      background: rgba(8, 0, 10, 0.95);
      border: 2px solid var(--border);
      box-shadow: inset 0 0 50px rgba(255, 30, 86, 0.15), 0 0 60px rgba(255, 30, 86, 0.3);
      width: 100%;
      position: relative;
    }

    .portfolio-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: var(--neon-red);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 800;
    }

    .portfolio-links {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .link-box {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: #000;
      border: 1px solid var(--neon-red-soft);
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.15em;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .link-box::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 30, 86, 0.8), transparent);
      transform: skewX(-20deg);
      transition: 0.3s;
    }

    .link-box:hover {
      background: var(--neon-glitch);
      color: #000;
      box-shadow: 0 0 30px var(--neon-glitch);
      transform: scale(1.02);
    }
    .link-box:hover::before { left: 200%; }
    .link-box span { position: relative; z-index: 1; }

    @media (max-width: 768px) {
      .profile-card { flex-direction: column; text-align: center; }
      .nick-line { font-size: 22px; }
      .status-container { justify-content: center; }
      .portfolio-card { padding: 20px; }
      .link-box { font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="heavy-pixel-mask"></div>
  <div class="glitch-blocks"></div>
  <div class="noise"></div>

  <div class="vram-artifacts">
    <div class="vram-bar"></div>
    <div class="vram-bar"></div>
    <div class="vram-bar"></div>
  </div>

  <div class="matrix-rain" id="matrixRain"></div>

  <div class="cursor-wrapper" id="custom-cursor">
    <div class="cursor-geo" id="cursor-geo"></div>
    <div class="cursor-core"></div>
  </div>

  <div class="page-container">
    <div class="profile-card">
      <div class="avatar-wrap">
        <img class="avatar-img" src="https://cdn-live.warthunder.com/uploads/c2/fc/1d/89c1994b2285c0fb13540b86af1d038c7d/asa.png" alt="avatar" />
        <div class="avatar-glitch-layer"></div>
        <div class="avatar-scanline"></div>
      </div>
      
      <div class="profile-info">
        <div class="dj-name">DJ_Alexander</div>
        <div class="nick-line">scarryscore</div>
        
        <div class="status-container">
          <div class="status-dot" id="discordDot"></div>
          <span id="discordText" style="color: #ffb8c6;">Fetching Status...</span>
        </div>
      </div>
    </div>

    <div class="portfolio-card">
      <div class="portfolio-label">PORTFOLIO LINKS</div>
      <div class="portfolio-links">
        <a class="link-box" href="https://wiki.ss14.su/" target="_blank" rel="noreferrer">
          <span>https://wiki.ss14.su/</span>
        </a>
        <a class="link-box" href="https://wiki.station14.space/" target="_blank" rel="noreferrer">
          <span>https://wiki.station14.space/</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const matrixContainer = document.getElementById('matrixRain');
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+-=[]{}|;:,.<>?/\\~`ｦÆｳｲｦΔΘΛΞΠΣΦΨΩαβγδεζηθικλμνξοπρστυφχψω";
    for (let i = 0; i < 40; i++) {
      const col = document.createElement('div');
      col.className = 'matrix-col';
      col.style.animationDuration = (Math.random() * 10 + 5) + 's';
      col.style.animationDelay = '-' + (Math.random() * 10) + 's';
      col.style.opacity = Math.random() * 0.5 + 0.3;
      let str = "";
      for(let j = 0; j < 80; j++) str += charset.charAt(Math.floor(Math.random() * charset.length)) + "\n";
      col.innerText = str;
      matrixContainer.appendChild(col);
      setInterval(() => {
        let newStr = "";
        for(let j = 0; j < 80; j++) newStr += charset.charAt(Math.floor(Math.random() * charset.length)) + "\n";
        col.innerText = newStr;
      }, Math.random() * 2000 + 1000);
    }

    const cursorWrapper = document.getElementById("custom-cursor");
    const cursorGeo = document.getElementById("cursor-geo");

    window.addEventListener("mousemove", (e) => {
      cursorWrapper.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    const interactables = document.querySelectorAll('a, button, .profile-card');
    interactables.forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursorGeo.style.borderRadius = "50%";
        cursorGeo.style.transform = "translate(-50%, -50%) rotate(0deg) scale(1.5)";
        cursorGeo.style.borderColor = "#ff003c";
        cursorGeo.style.boxShadow = "inset 0 0 20px #ff003c, 0 0 20px #ff003c";
      });
      el.addEventListener('mouseleave', () => {
        cursorGeo.style.borderRadius = "0";
        cursorGeo.style.transform = "translate(-50%, -50%) rotate(45deg) scale(1)";
        cursorGeo.style.borderColor = "#fff";
        cursorGeo.style.boxShadow = "inset 0 0 10px #fff, 0 0 15px #fff";
      });
    });

    const USER_ID = '871109389912797245'; 
    const discordDot = document.getElementById('discordDot');
    const discordText = document.getElementById('discordText');

    async function fetchDiscordStatus() {
      try {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const result = await response.json();
        
        if (result.success) {
          const status = result.data.discord_status; 
          
          discordDot.className = 'status-dot';
          discordDot.classList.add(status);

          const statusMap = {
            'online': 'Online',
            'idle': 'Idle / Away',
            'dnd': 'Do Not Disturb',
            'offline': 'Offline'
          };
          discordText.innerText = statusMap[status] || status;
        } else {
          discordText.innerText = "Lanyard Error";
          discordDot.className = 'status-dot offline';
        }
      } catch (err) {
        discordText.innerText = "API Error";
      }
    }

    fetchDiscordStatus();
    setInterval(fetchDiscordStatus, 15000);

    <!-- тест -->
  </script>
</body>
</html>
